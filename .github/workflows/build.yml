name: Build RSDKv4 Plus

on:
  push:
    paths:
      - android/**
      - dependencies/**
      - RSDKv4/**
      - platforms/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - main
  workflow_dispatch:
    inputs: 
       windows-x64: 
         type: boolean
         description: 'Windows (x64)'
       windows-x86:
         type: boolean
         description: 'Windows (x86)'
       linux: 
         type: boolean
         description: 'Linux'
       android: 
         type: boolean
         description: 'Android'
       wasm:
         type: boolean
         description: 'WebAssembly (Emscripten)'

env:
  GENERAL_FLAGS: "-DRETRO_DISABLE_PLUS=ON -DCMAKE_BUILD_TYPE=Release -DRETRO_SDL_VERSION=2 -DRETRO_USE_HW_RENDER=OFF -DRETRO_USE_STEAM=OFF -DRETRO_USE_DISCORD=OFF -DRETRO_ICON_NAME=\"RSDKv4 Decomp Icon.ico\" -DRETRO_OUTPUT_NAME=\"RSDKv4+\""
  # Normally you would use $VCPKG_INSTALLATION_PATH, but it's broken...so hardcode C:/vcpkg
  GENERAL_WIN_FLAGS: "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
  WIN32_FLAGS: "-DVCPKG_TARGET_TRIPLET=x86-windows-static -DCMAKE_PREFIX_PATH=C:/vcpkg/installed/x86-windows-static/ -A Win32"
  WIN64_FLAGS: "-DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_PREFIX_PATH=C:/vcpkg/installed/x64-windows-static/"
  # FIXME: For some reason ubuntu enables _FORTIFY_SOURCE by default, so let's override it to prevent IO bugs
  GENERAL_LINUX_FLAGS: "-DCMAKE_CXX_FLAGS='-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0'"
  # WASM: HW render, Steam, Discord, and networking are all force-disabled by platforms/Emscripten.cmake.
  # OUTPUT_NAME is also forced to "RSDKv4" by that file, so passing RETRO_OUTPUT_NAME here has no effect.
  GENERAL_WASM_FLAGS: "-DCMAKE_BUILD_TYPE=Release -DRETRO_SDL_VERSION=2 -DRETRO_MOD_LOADER=ON"

jobs:
  v4-windows:
    if: ${{ github.event.inputs.windows-x86 == 'true' || github.event_name == 'push' }}  
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: vcpkg install glew sdl2 libogg libtheora libvorbis curl --triplet=x86-windows-static
      - name: Build RSDKv4
        run: |
          cmake -B build ${{env.GENERAL_FLAGS}} ${{env.GENERAL_WIN_FLAGS}} ${{env.WIN32_FLAGS}} 
          cmake --build build --parallel --config Release
      - name: Move artifacts
        run: |
          mkdir artifacts
          mv ./build/Release/*.exe ./artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v4-windows
          path: artifacts
  v4-windows-x64:
    if: ${{ github.event.inputs.windows-x64 == 'true' || github.event_name == 'push' }}  
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: vcpkg install glew sdl2 libogg libtheora libvorbis curl --triplet=x64-windows-static
      - name: Build RSDKv4
        run: |
          cmake -B build ${{env.GENERAL_FLAGS}} ${{env.GENERAL_WIN_FLAGS}} ${{env.WIN64_FLAGS}}
          cmake --build build --parallel --config Release
      - name: Move artifacts
        run: |
          mkdir artifacts
          mv ./build/Release/*.exe ./artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v4-windows-x64
          path: artifacts

  v4-android:
    if: ${{ github.event.inputs.android == 'true' || github.event_name == 'push' }}  
    runs-on: windows-latest
    steps:
      - name: Checkout repository Android
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Download libogg, libvorbis, and libtheora for easier includes
        run: |
          Invoke-WebRequest -Uri "https://ftp.osuosl.org/pub/xiph/releases/vorbis/libvorbis-1.3.7.zip" -OutFile "libvorbis.zip"
          Expand-Archive -Path libvorbis.zip -DestinationPath ./dependencies/android/
          Rename-Item ./dependencies/android/libvorbis-1.3.7 libvorbis
          Invoke-WebRequest -Uri "https://ftp.osuosl.org/pub/xiph/releases/ogg/libogg-1.3.5.zip" -OutFile "libogg.zip"
          Expand-Archive -Path libogg.zip -DestinationPath ./dependencies/android/app/jni/src/dependencies/android/
          Rename-Item ./dependencies/android/app/jni/src/dependencies/android/libogg-1.3.5 libogg
          Invoke-WebRequest -Uri "https://ftp.osuosl.org/pub/xiph/releases/vorbis/libvorbis-1.3.7.zip" -OutFile "libvorbis.zip"
          Expand-Archive -Path libvorbis.zip -DestinationPath ./dependencies/android/app/jni/src/dependencies/android/
          Rename-Item ./dependencies/android/app/jni/src/dependencies/android/libvorbis-1.3.7 libvorbis
          Invoke-WebRequest -Uri "https://ftp.osuosl.org/pub/xiph/releases/theora/libtheora-1.1.1.zip" -OutFile "libtheora.zip"
          Expand-Archive -Path libtheora.zip -DestinationPath ./dependencies/android
          Rename-Item ./dependencies/android/libtheora-1.1.1 libtheora
      - name: Download GLEW
        run: |
          Invoke-WebRequest -Uri "https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0-win32.zip" -OutFile "GLEW.zip"
          Expand-Archive -Path GLEW.zip -DestinationPath ./dependencies/android/
          Rename-Item ./dependencies/android/glew-2.2.0 glew
      - name: Download SDL2
        run: |
          Invoke-WebRequest -Uri "https://libsdl.org/release/SDL2-2.28.3.zip" -OutFile "SDL2.zip"
          Expand-Archive -Path SDL2.zip -DestinationPath ./android/app/jni/
          Rename-Item ./android/app/jni/SDL2-2.28.3 SDL
      - name: Move & Copy stuff
        run: |
          Copy-Item -Path ./dependencies/android/app/jni/src/dependencies/android\* -Destination ./dependencies/
          Copy-Item -Path ./dependencies/android/app/jni/src/dependencies/android/libogg/ -Destination ./dependencies/android/ -recurse
          Copy-Item -Path ./dependencies/android/config_types.h -Destination ./dependencies/android/libogg/include/ogg/
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 11
      - name: Build RSDKv4 Android
        working-directory: ./android
        run: |
          ./gradlew.bat assembleDebug --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a" -PRETRO_DISABLE_PLUS=ON -PCMAKE_BUILD_TYPE=Release -PRETRO_SDL_VERSION=2 -PRETRO_USE_HW_RENDER=OFF -PRETRO_USE_STEAM=OFF -PRETRO_USE_DISCORD=OFF
      - name: Upload artifact Android
        uses: actions/upload-artifact@v4
        with:
          name: v4-android
          path: ./android/app/build/outputs/apk
  v4-linux:
    if: ${{ github.event.inputs.linux == 'true' || github.event_name == 'push' }}  
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libglew-dev libglfw3-dev libsdl2-dev libogg-dev libtheora-dev libvorbis-dev libcurl4-openssl-dev
      - name: Build RSDKv4
        run: |
          cmake -B build ${{env.GENERAL_FLAGS}} ${{env.GENERAL_LINUX_FLAGS}}
          cmake --build build --parallel
      # tar the executables so that they don't lose exec permissions
      # see: https://github.com/actions/upload-artifact?tab=readme-ov-file#permission-loss
      - name: Move artifacts
        run: |
          mkdir artifacts
          mv ./build/RSDKv4* ./artifacts
          tar -czvf linux.tar.gz -C ./artifacts .
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v4-linux
          path: linux.tar.gz

  v4-wasm:
    if: ${{ github.event.inputs.wasm == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache the emsdk installation so repeated runs don't re-download it
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emsdk-cache
          key: emsdk-latest

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      # Emscripten.cmake builds libtheora from source (no pre-built WASM package
      # exists). The standard source files are expected at dependencies/all/libtheora/
      # but are not bundled in the repo. Download libtheora-1.1.1 and place them
      # there using cp -rn so any custom in-tree files are not overwritten.
      # encoder_disabled.c is not in the standard libtheora distribution so we
      # create it here if it was not already present in the repo.
      - name: Download libtheora sources
        run: |
          wget -q https://downloads.xiph.org/releases/theora/libtheora-1.1.1.tar.gz -O libtheora.tar.gz
          tar -xzf libtheora.tar.gz
          mkdir -p dependencies/all/libtheora
          cp -rn libtheora-1.1.1/. dependencies/all/libtheora/
          if [ ! -f dependencies/all/libtheora/lib/encoder_disabled.c ]; then
            cat > dependencies/all/libtheora/lib/encoder_disabled.c << 'STUBEOF'
          /* Decode-only build: stub out all encoder entry points. */
          #include "internal.h"
          th_enc_ctx *th_encode_alloc(const th_info *i, const th_setup_info *s) { (void)i; (void)s; return NULL; }
          void th_encode_free(th_enc_ctx *e) { (void)e; }
          int th_encode_flushheader(th_enc_ctx *e, th_comment *c, ogg_packet *op) { (void)e; (void)c; (void)op; return TH_EIMPL; }
          int th_encode_ctl(th_enc_ctx *e, int r, void *b, size_t s) { (void)e; (void)r; (void)b; (void)s; return TH_EIMPL; }
          int th_encode_packetout(th_enc_ctx *e, int l, ogg_packet *op) { (void)e; (void)l; (void)op; return TH_EIMPL; }
          int th_encode_setq(th_enc_ctx *e, th_quant_info *q) { (void)e; (void)q; return TH_EIMPL; }
          STUBEOF
          fi

      - name: Build RSDKv4 WASM
        run: |
          emcmake cmake -B build ${{env.GENERAL_WASM_FLAGS}}
          cmake --build build --parallel

      # Collect all three output files produced by the Emscripten build:
      #   RSDKv4.js       — JS loader / glue
      #   RSDKv4.wasm     — compiled WASM binary
      #   RSDKv4.worker.js — pthread Web Worker (generated by -sUSE_PTHREADS=1)
      - name: Move artifacts
        run: |
          mkdir artifacts
          mv ./build/RSDKv4.js      ./artifacts/
          mv ./build/RSDKv4.wasm    ./artifacts/
          mv ./build/RSDKv4.worker.js ./artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v4-wasm
          path: artifacts
